name: CD-dev

on:
  workflow_run:
    workflows: [CI-dev]
    types: [completed]
    branches: [dev]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          SHA=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)
          echo "sha_tag=$SHA" >> $GITHUB_OUTPUT

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy
            MINIO_ROOT_USER=dummy
            MINIO_ROOT_PASSWORD=dummy
          tags: |
            ghcr.io/byu-ece-software/template-repo-dev:latest
            ghcr.io/byu-ece-software/template-repo-dev:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build and push migrator image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migrator
          push: true
          tags: |
            ghcr.io/byu-ece-software/template-repo-dev-migrator:latest
            ghcr.io/byu-ece-software/template-repo-dev-migrator:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=migrator
          cache-to: type=gha,mode=max,scope=migrator

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ghcr.io/byu-ece-software/template-repo-dev-nginx:latest
            ghcr.io/byu-ece-software/template-repo-dev-nginx:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build-and-push

    steps:

      # - name: Log in to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy to test server
        uses: appleboy/ssh-action@v1.0.0
        with:
          # Github Repo secrets
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail # Exit on Error, unset vars, or failed pipes

            echo '${{ secrets.GITHUB_TOKEN }}' | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd ~/Template-Repo

            git switch dev

            git pull origin dev

            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

            # 1. Pull new images
            echo "Pulling images (tag: $IMAGE_TAG)..."
            docker compose -f docker-compose.test.yaml pull

            # 2a. Ensure db is up and healthy before backing up
            echo "Starting database..."
            docker compose -f docker-compose.test.yaml up -d db
            echo "Waiting for database to be ready..."
            until docker compose -f docker-compose.test.yaml exec -T db pg_isready > /dev/null 2>&1; do
              echo "  ...waiting"
              sleep 2
            done
            echo "Database is ready."

            # 2. Database backup
            echo "Backing up database..."
            mkdir -p ~/backups/template-repo
            docker compose -f docker-compose.test.yaml exec -T db \
              sh -c 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' \
              > ~/backups/template-repo/db-backup-$(date +%Y%m%d-%H%M%S).sql
            echo "Backup complete."
            echo "Clearing old DB backups"
            ls -t ~/backups/template-repo/db-backup-*.sql | tail -n +11 | xargs -r rm --
            echo "Cleared old Backups"

            # 3. Run migrations
            echo "Running migrations..."
            docker compose -f docker-compose.test.yaml \
              up --no-build --exit-code-from migrate migrate

            # 4. Deploy new app
            echo "Deploying app..."
            docker compose -f docker-compose.test.yaml \
              up -d --remove-orphans

            # 5. Cleanup
            echo "Pruning old images..."
            docker image prune -f

            echo "Deploy complete — running tag $IMAGE_TAG"
