name: CD-dev

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [dev]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_tag=$SHA" >> $GITHUB_OUTPUT

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/template-repo-dev:latest
            ghcr.io/${{ github.repository_owner }}/template-repo-dev:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrator image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migrator
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/template-repo-dev-migrator:latest
            ghcr.io/${{ github.repository_owner }}/template-repo-dev-migrator:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrator image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/template-repo-dev-nginx:latest
            ghcr.io/${{ github.repository_owner }}/template-repo-dev-nginx:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to test server
        uses: appleboy/ssh-action@v1
        with:
          # Github Repo secrets
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail # Exit on Error, unset vars, or failed pipes
            cd ~/Template-Repo

            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

            # 1. Pull new images
            echo "Pulling images (tag: $IMAGE_TAG)..."
            docker compose -f docker-compose.test.yaml -p template-repo pull

            # 2. Database backup
            echo "Backing up database..."
            mkdir -p ~/backups/template-repo
            docker compose -f docker-compose.test.yaml -p template-repo exec -T db \
              pg_dump -U $POSTGRES_USER $POSTGRES_DB \
              > ~/backups/db-backup-$(date +%Y%m%d-%H%M%S).sql
            echo "Backup complete."

            # 3. Run migrations
            echo "Running migrations..."
            docker compose -f docker-compose.test.yaml -p template-repo \
              up --no-build --exit-code-from migrate migrate

            # 4. Deploy new app
            echo "Deploying app..."
            docker compose -f docker-compose.test.yaml -p template-repo \
              up -d --remove-orphans

            # 5. Cleanup
            echo "Pruning old images..."
            docker image prune -f

            echo "Deploy complete — running tag $IMAGE_TAG"