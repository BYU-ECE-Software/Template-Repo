name: CI-dev

on:
  push:
    branches:
      - "dev"
  pull_request:
    branches:
      - "dev"

jobs:
  quality:
    name: Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npx prettier --check .

      - name: Run tests # run tests
        run: npx vitest run
        
        # - name: Lint
        #   run: npx eslint .  
        
      - name: Check build
        run: npm run build
