name: template_repo

services:
  app:
    image: ghcr.io/byu-ece-software/template-repo-dev:${IMAGE_TAG:-latest}
    container_name: template_repo_app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - network
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.template-repo-api.rule=Host(`template.ecesoftwaretesting.byu.edu`) && PathPrefix(`/api`)
      - traefik.http.routers.template-repo-api.entrypoints=websecure
      - traefik.http.routers.template-repo-api.tls=true
      - traefik.http.routers.template-repo-api.service=template-repo-api
      - traefik.http.services.template-repo-api.loadbalancer.server.port=3000

  nginx:
    image: ghcr.io/byu-ece-software/template-repo-dev-nginx:${IMAGE_TAG:-latest}
    container_name: template_repo_nginx
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - network
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.template-repo.rule=Host(`template.ecesoftwaretesting.byu.edu`)
      - traefik.http.routers.template-repo.entrypoints=websecure
      - traefik.http.routers.template-repo.tls=true
      - traefik.http.routers.template-repo.service=template-repo
      - traefik.http.services.template-repo.loadbalancer.server.port=80
      # If your frontend needs bigger uploads:
      # - traefik.http.middlewares.site1-buffer.buffering.maxRequestBodyBytes=104857600
      # - traefik.http.routers.site1.middlewares=site1-buffer

  db:
    image: postgres:16
    container_name: template_repo_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} && psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - network

  minio:
    image: minio/minio
    container_name: template_repo_minio
    restart: unless-stopped
    expose:
      # - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - network

  # See docker-compose.migrate.yml for in depth explanations about createbuckets and what to change
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing myminio/sample-images;
      echo 'Bucket ensured: sample-images';
      exit 0;
      "
    networks:
      - network

  migrate:
    image: ghcr.io/byu-ece-software/template-repo-dev-migrator:${IMAGE_TAG:-latest}
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: "no" # run once and exit
    depends_on:
      db:
        condition: service_healthy
    networks:
      - network

networks:
  network:
    driver: bridge
  proxy:
    external: true

volumes:
  db_data:
  minio_data:
